<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Webhook Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: sans-serif; margin: 0; background: #f8f9fa; color: #222; }

    nav {
      background: #1a1a2e; padding: 0.75rem 2rem;
      display: flex; align-items: center; gap: 1.5rem;
    }
    nav a { color: #a0c4ff; text-decoration: none; font-size: 0.9rem; }
    nav a:hover { color: #fff; }
    nav .brand { color: #fff; font-weight: 600; font-size: 1rem; margin-right: auto; }

    .page { padding: 2rem; max-width: 1100px; margin: 0 auto; }
    h1 { margin: 0 0 1.5rem; font-size: 1.4rem; }
    h2 { font-size: 1.1rem; margin: 0 0 1rem; }

    /* tables */
    table { border-collapse: collapse; width: 100%; background: #fff;
            border-radius: 6px; overflow: hidden;
            box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    th, td { border: 1px solid #e0e0e0; padding: 7px 12px; text-align: left;
             font-size: 0.85rem; }
    th { background: #f0f0f0; font-weight: 600; }
    tr:hover td { background: #fafafa; }

    .status-delivered  { color: #2a9d2a; font-weight: 600; }
    .status-failed     { color: #c0392b; font-weight: 600; }
    .status-pending, .status-in_progress { color: #b58900; font-weight: 600; }

    /* cards */
    .card {
      background: #fff; border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,.1);
      padding: 1.25rem 1.5rem; margin-bottom: 2rem;
    }

    /* forms */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem 1.25rem; }
    .form-grid .full { grid-column: 1 / -1; }
    label { display: block; font-size: 0.8rem; font-weight: 600;
            color: #555; margin-bottom: 3px; }
    input[type=text], textarea {
      width: 100%; padding: 7px 10px; border: 1px solid #ccc;
      border-radius: 4px; font-size: 0.85rem; font-family: monospace;
    }
    input[type=text]:focus, textarea:focus {
      outline: none; border-color: #4a90e2; box-shadow: 0 0 0 2px rgba(74,144,226,.2);
    }
    textarea { resize: vertical; min-height: 70px; }

    /* buttons */
    .btn {
      display: inline-block; padding: 7px 14px; border: none; border-radius: 4px;
      font-size: 0.82rem; font-weight: 600; cursor: pointer; text-align: center;
    }
    .btn-primary { background: #1a1a2e; color: #fff; }
    .btn-primary:hover { background: #2d2d50; }
    .btn-sm { padding: 4px 10px; font-size: 0.78rem; }
    .btn-danger { background: #c0392b; color: #fff; }
    .btn-danger:hover { background: #a93226; }
    .btn-outline {
      background: #fff; color: #333; border: 1px solid #ccc;
    }
    .btn-outline:hover { background: #f5f5f5; }

    /* preset pills */
    .presets { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1rem; }
    .presets span { font-size: 0.78rem; color: #777; align-self: center; }
    .preset-btn {
      padding: 4px 10px; border-radius: 12px; border: 1px solid #ccc;
      background: #f5f5f5; font-size: 0.78rem; cursor: pointer; font-weight: 500;
    }
    .preset-btn:hover { background: #e8e8e8; border-color: #aaa; }
    .preset-btn.benign   { border-color: #2a9d2a; color: #2a9d2a; }
    .preset-btn.tempdown { border-color: #b58900; color: #b58900; }
    .preset-btn.alwaysdown { border-color: #c0392b; color: #c0392b; }
    .preset-btn.wildcard { border-color: #4a90e2; color: #4a90e2; }

    .form-row { display: flex; align-items: flex-end; gap: 0.75rem; margin-top: 0.75rem; }
    .optional-badge {
      font-size: 0.7rem; font-weight: 400; color: #999;
      background: #eee; border-radius: 3px; padding: 1px 5px; margin-left: 5px;
    }
  </style>
</head>
<body>
  <nav>
    <span class="brand">Webhook Dashboard</span>
    <a href="/dashboard">Events</a>
    <a href="/dashboard/subscriptions">Subscriptions</a>
  </nav>
  <div class="page">
    <h1>{% block title %}{% endblock %}</h1>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
